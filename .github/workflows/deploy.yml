name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: progleam-website
      HAS_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Skip notice (secrets not set)
        if: ${{ env.HAS_SECRETS != 'true' }}
        run: echo "Both CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID must be set (repo or org secrets) to enable auto-deploy. One or both are missing. Skipping this run."

      - name: Checkout
        if: ${{ env.HAS_SECRETS == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.HAS_SECRETS == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build clean deploy folder (allowlist public files only)
        if: ${{ env.HAS_SECRETS == 'true' }}
        run: |
          set -euo pipefail
          rm -rf .cloudflare-deploy
          mkdir -p .cloudflare-deploy
          # Allowlisted top-level public files (skip silently if absent).
          for f in *.html robots.txt sitemap.xml llms.txt _headers _redirects progleam-roof-cleaning-kilmarnock.jpg; do
            [ -e "$f" ] && cp "$f" .cloudflare-deploy/ || true
          done
          # Allowlisted public directories.
          for d in assets areas services gallery contact quote partners privacy-policy cookie-policy terms accessibility; do
            [ -d "$d" ] && cp -r "$d" .cloudflare-deploy/ || true
          done
          echo "==> Files that will be deployed:"
          find .cloudflare-deploy -type f | sort
          BAD=$(find .cloudflare-deploy \
            \( -type f \( \
                 -name '*.md' -o -name '*.py' -o -name '.git*' -o -name '.assetsignore' \
              -o -name '.env*' -o -name '*.ps1' -o -name '*.sh' -o -name '*.bat' -o -name '*.cmd' \
              -o -name 'package*.json' -o -name 'wrangler*.toml' -o -name 'deploy*.yml' \) \) \
            -o \( -type d \( \
                 -name '.git' -o -name '.github' -o -name '.wrangler' -o -name 'node_modules' \) \) \
          )
          if [ -n "$BAD" ]; then
            echo "ERROR: internal/risky file or directory found in deploy folder:"
            echo "$BAD"
            exit 1
          fi

      - name: Ensure Pages project exists
        if: ${{ env.HAS_SECRETS == 'true' }}
        run: npx wrangler@4 pages project create "$PROJECT_NAME" --production-branch=main || true

      - name: Deploy clean folder to Cloudflare Pages
        if: ${{ env.HAS_SECRETS == 'true' }}
        run: npx wrangler@4 pages deploy .cloudflare-deploy --project-name="$PROJECT_NAME" --branch=main --commit-dirty=true
